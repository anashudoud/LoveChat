<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>LoveChat ✨</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <!-- 🌌 خلفيات متحركة -->
  <div class="bg-layer"></div>
  <div class="bg-orbs"></div>

  <!-- 🔐 شاشة الدخول -->
  <section id="auth-screen" class="screen active">
    <div class="glass-card auth-box">
      <div class="logo">💬</div>
      <h1>LoveChat</h1>
      <p class="sub">مساحة المحادثة الآمنة</p>
      
      <!-- ✅ نموذج الدخول المصحح -->
      <form id="login-form">
        <div class="field">
          <label>اسم المستخدم</label>
          <input type="text" id="username" placeholder="مثال: خالد" required autocomplete="username">
        </div>
        <div class="field">
          <label>كلمة المرور (اختياري)</label>
          <input type="password" id="password" placeholder="••••••" autocomplete="new-password">
        </div>
        <button type="submit" class="btn primary">دخول آمن 🔓</button>
      </form>
      
      <p class="hint">✨ لا يحتاج تسجيل مسبق • أي اسم يعمل</p>
    </div>
  </section>

  <!-- 💬 الشاشة الرئيسية -->
  <section id="chat-screen" class="screen">
    <aside class="sidebar glass" id="sidebar">
      <div class="header">
        <div class="profile">
          <img id="my-av" class="av" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="avatar">
          <div>
            <span id="my-name" class="name">زائر</span>
            <span class="st online">● متصل</span>
          </div>
        </div>
        <button class="icon" id="logout-btn" title="خروج">🚪</button>
      </div>
      
      <div class="search">
        <input type="text" id="search" placeholder="🔍 بحث...">
      </div>
      
      <div id="ulist" class="list">
        <!-- سيتم ملؤها تلقائياً بالجافاسكريبت -->
      </div>
    </aside>

    <main class="chat glass" id="chat">
      <header class="c-header">
        <button class="icon back" id="back-btn" title="رجوع">←</button>
        <img id="c-av" class="av" src="https://ui-avatars.com/api/?name=Chat&background=ec4899&color=fff" alt="chat">
        <div class="info">
          <h2 id="c-name">اختر محادثة</h2>
          <span id="c-st" class="st">جاهز</span>
        </div>
        <div class="acts">
          <button class="icon call" id="call-audio" title="مكالسة صوتية">📞</button>
          <button class="icon call" id="call-video" title="مكالسة مرئية">📹</button>
        </div>
      </header>
      
      <div id="msgs" class="msgs">
        <div class="empty">💬 لا توجد رسائل بعد</div>
      </div>
      
      <footer class="input">
        <button class="act" id="att" title="صورة/فيديو">📷</button>
        <button class="act" id="mic" title="تسجيل صوتي (اضغط مطولاً)">🎤</button>
        <input type="text" id="txt" placeholder="اكتب رسالتك..." autocomplete="off">
        <button class="send" id="snd">➤</button>
        <input type="file" id="file" accept="image/*,video/*" hidden>
      </footer>
    </main>
  </section>

  <!-- 📞 شاشة المكالسة -->
  <section id="call-screen" class="screen overlay">
    <div class="call-wrap">
      <video id="rem" autoplay playsinline></video>
      <video id="loc" autoplay playsinline muted class="pip"></video>
      <div class="c-info">
        <img id="call-av" class="av lg" src="" alt="caller">
        <h3 id="call-nm">جارٍ الاتصال...</h3>
        <span id="call-st" class="tag">يرجى الانتظار</span>
      </div>
      <div class="ctrls">
        <button class="btn ctrl" id="mute-btn">🔊</button>
        <button class="btn ctrl" id="cam-btn" style="display:none">🔄</button>
        <button class="btn danger" id="end-call-btn">📞</button>
      </div>
    </div>
  </section>

  <!-- 🔔 نافذة المكالسة الواردة -->
  <div id="inc-modal" class="modal hidden">
    <div class="glass-box">
      <div class="pulse-ring"></div>
      <img id="inc-av" class="av lg" src="https://ui-avatars.com/api/?name=Caller&background=ec4899&color=fff" alt="caller">
      <h3 id="inc-nm">مكالسة واردة</h3>
      <span id="inc-type" class="tag">📞 صوتية</span>
      <div class="m-acts">
        <button class="btn reject" id="reject-btn">❌ رفض</button>
        <button class="btn accept" id="accept-btn">✅ قبول</button>
      </div>
    </div>
  </div>

  <!-- 🧠 ربط الجافاسكريبت -->
  <script src="script.js"></script>
  
  <!-- 📱 تسجيل Service Worker (اختياري) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
